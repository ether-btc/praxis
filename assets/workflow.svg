<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07080c"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="cyan-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="mag-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e040fb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e040fb" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="green-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="amber-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffab00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="red-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5252" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff5252" stop-opacity="0.05"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#e040fb" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#00e676" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg2)"/>

  <!-- Grid -->
  <g stroke="#1e2235" stroke-width="0.5" opacity="0.2">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
  </g>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#555d78" letter-spacing="3" font-weight="400">HOW PRAXIS WORKS</text>

  <!-- Node 1: User Request -->
  <rect x="40" y="120" width="150" height="70" rx="10" fill="url(#amber-g)" stroke="#ffab00" stroke-width="0.8"/>
  <text x="115" y="150" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#ffab00">USER REQUEST</text>
  <text x="115" y="170" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#8890a8">"Design an auth system"</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="155" x2="230" y2="155" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Node 2: Classify -->
  <rect x="235" y="105" width="150" height="100" rx="10" fill="url(#cyan-g)" stroke="#00e5ff" stroke-width="0.8"/>
  <text x="310" y="132" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#00e5ff">CLASSIFY</text>
  <text x="310" y="152" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Name problem type</text>
  <text x="310" y="166" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Enumerate constraints</text>
  <text x="310" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Select frameworks</text>
  <text x="310" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Frame approach</text>

  <!-- Arrow 2→3 -->
  <line x1="385" y1="155" x2="425" y2="155" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Node 3: Reason -->
  <rect x="430" y="105" width="150" height="100" rx="10" fill="url(#mag-g)" stroke="#e040fb" stroke-width="0.8"/>
  <text x="505" y="132" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#e040fb">REASON</text>
  <text x="505" y="152" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">STRIDE threat model</text>
  <text x="505" y="166" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Architecture analysis</text>
  <text x="505" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">5 hypotheses + test</text>
  <text x="505" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Decision matrix</text>

  <!-- Arrow 3→4 -->
  <line x1="580" y1="155" x2="620" y2="155" stroke="#e040fb" stroke-width="1.5" marker-end="url(#arr-m)" opacity="0.6"/>

  <!-- Node 4: Validate -->
  <rect x="625" y="105" width="150" height="100" rx="10" fill="url(#red-g)" stroke="#ff5252" stroke-width="0.8"/>
  <text x="700" y="132" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#ff5252">VALIDATE</text>
  <text x="700" y="152" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Inversion check</text>
  <text x="700" y="166" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Second-order effects</text>
  <text x="700" y="180" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Adversarial analysis</text>
  <text x="700" y="194" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">7 gap-analysis checks</text>

  <!-- Arrow 4→5 -->
  <line x1="775" y1="155" x2="815" y2="155" stroke="#00e676" stroke-width="1.5" marker-end="url(#arr-g)" opacity="0.6"/>

  <!-- Node 5: Execute -->
  <rect x="820" y="120" width="150" height="70" rx="10" fill="url(#green-g)" stroke="#00e676" stroke-width="0.8"/>
  <text x="895" y="148" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#00e676">EXECUTE</text>
  <text x="895" y="170" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#8890a8">Confident, validated code</text>

  <!-- Arrow 5→6 -->
  <line x1="970" y1="155" x2="1010" y2="155" stroke="#00e676" stroke-width="1.5" marker-end="url(#arr-g)" opacity="0.6"/>

  <!-- Node 6: Review -->
  <rect x="1015" y="120" width="140" height="70" rx="10" fill="url(#cyan-g)" stroke="#00e5ff" stroke-width="0.8"/>
  <text x="1085" y="148" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#00e5ff">REVIEW</text>
  <text x="1085" y="168" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">15 quality checks</text>
  <text x="1085" y="182" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#8890a8">Security verification</text>

  <!-- Skill labels -->
  <text x="310" y="230" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#00e5ff" opacity="0.7">problem-classification</text>

  <text x="505" y="230" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e040fb" opacity="0.7">security / architecture</text>
  <text x="505" y="244" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#e040fb" opacity="0.7">diagnostic / decision</text>

  <text x="700" y="230" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#ff5252" opacity="0.7">gap-analysis</text>

  <text x="1085" y="215" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#00e5ff" opacity="0.7">code-quality-analysis</text>

  <!-- Layer labels -->
  <rect x="220" y="270" width="570" height="30" rx="6" fill="none" stroke="#00e5ff" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <text x="505" y="290" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#00e5ff" opacity="0.5">PRAXIS — reasoning layer</text>

  <rect x="805" y="270" width="365" height="30" rx="6" fill="none" stroke="#00e676" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <text x="987" y="290" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#00e676" opacity="0.5">EXECUTION — standalone or Superpowers</text>

  <!-- Confidence badge -->
  <rect x="430" y="325" width="340" height="36" rx="8" fill="#111420" stroke="#1e2235" stroke-width="0.5"/>
  <text x="600" y="348" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8890a8">Confidence: HIGH (90%+) · MEDIUM · LOW · INSUFFICIENT</text>

  <!-- Bottom -->
  <rect x="100" y="385" width="1000" height="1" fill="#1e2235"/>
  <text x="600" y="397" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555d78">Every analysis reports calibrated confidence · Uncertainty is explicit, never hidden</text>
</svg>
